name = "shadowspeak-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
CANTONESE_AI_BASE = "https://cantonese.ai/api"

# Secrets (set via `wrangler secret put`):
# - CANTONESE_AI_KEY
# - STRIPE_SECRET_KEY       — Stripe secret key (sk_live_... or sk_test_...)
# - STRIPE_PRICE_MONTHLY    — Stripe Price ID for £9.99/month
# - STRIPE_PRICE_ANNUAL     — Stripe Price ID for £54.99/year (7-day trial configured here)
# - STRIPE_PRICE_LIFETIME   — Stripe Price ID for £149 one-time
# - STRIPE_PRICE_FAMILY     — Stripe Price ID for £79.99/year family

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "4a14059ca271485ca6985a22beb66077"

[[kv_namespaces]]
binding = "PUSH_SUBS"
id = "084e4c7689684d1a96c531e42a26e0cf"

[triggers]
crons = ["0 * * * *"]
